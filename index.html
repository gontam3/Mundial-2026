<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porra Mundial 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#0F6E56;--green-light:#E1F5EE;--green-mid:#1D9E75;
  --gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32;
  --bg:#f7f8fa;--card:#fff;--border:#e5e7eb;
  --text:#111;--muted:#6b7280;--red:#A32D2D;--blue:#185FA5;--purple:#534AB7;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--green);color:#fff;padding:1.25rem 1rem 1rem;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{font-size:1.25rem;font-weight:600;margin-bottom:2px}
header p{font-size:.8rem;color:#9FE1CB}
nav{display:flex;gap:6px;padding:.75rem 1rem;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:68px;z-index:9}
nav button{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:.8rem;cursor:pointer;white-space:nowrap;color:var(--muted);font-weight:500}
nav button.active{background:var(--green);color:#fff;border-color:var(--green)}
.main{max-width:680px;margin:0 auto;padding:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;margin-bottom:.75rem}
.section-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;font-weight:600}
/* Ranking */
.rank-row{display:flex;align-items:center;gap:10px;padding:.7rem .9rem;border-radius:10px;background:var(--card);border:1px solid var(--border);margin-bottom:.5rem;cursor:pointer;transition:border-color .15s}
.rank-row:hover{border-color:var(--green)}
.rank-row.gold{border-color:var(--gold);border-width:2px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:.85rem;flex-shrink:0}
.rank-name{font-weight:600;font-size:.9rem;margin-bottom:3px}
.rank-bar-wrap{height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden;width:100%}
.rank-bar{height:100%;background:var(--green);border-radius:2px;transition:width .4s}
.rank-pts{text-align:right;flex-shrink:0}
.rank-pts .big{font-size:1.2rem;font-weight:700;line-height:1}
.rank-pts .small{font-size:.65rem;color:var(--muted)}
/* Pts breakdown */
.pts-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.9rem}
.pts-card{background:#f3f4f6;border-radius:8px;padding:8px 10px}
.pts-card .lbl{font-size:.65rem;color:var(--muted);margin-bottom:2px}
.pts-card .val{font-size:1.1rem;font-weight:700}
/* Matches */
.match-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:.8rem}
.match-row:last-child{border-bottom:none}
.team{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.team.left{text-align:right}
.score-box{background:#f3f4f6;border-radius:6px;padding:2px 8px;font-size:.8rem;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0}
.score-box.played{font-weight:700}
.pts-badge{font-size:.65rem;font-weight:700;text-align:center;margin-top:1px}
/* Groups */
.group-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.9rem}
.group-tabs button{padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:#fff;font-size:.75rem;cursor:pointer;color:var(--muted)}
.group-tabs button.active{background:var(--green);color:#fff;border-color:var(--green)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:center;color:var(--muted);font-weight:500;font-size:.7rem;padding:4px 5px;border-bottom:1px solid var(--border)}
th.left{text-align:left}
td{text-align:center;padding:5px;border-bottom:1px solid #f0f0f0}
td.left{text-align:left}
tr:last-child td{border-bottom:none}
/* Admin */
.admin-toggle{margin-left:auto;background:none;border:1px solid rgba(255,255,255,.3);color:#fff;font-size:.75rem;padding:4px 10px;border-radius:8px;cursor:pointer}
.admin-panel{background:#fff;border:1px solid var(--green);border-radius:10px;padding:.9rem 1rem;margin:0 0 1rem}
.upload-btn{background:var(--green-light);color:var(--green);border:1px solid var(--green);border-radius:8px;padding:6px 14px;font-size:.8rem;cursor:pointer;display:inline-block}
input[type=file]{display:none}
input[type=password]{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;width:120px}
button.go{padding:6px 14px;border-radius:8px;border:1px solid var(--green);background:var(--green);color:#fff;cursor:pointer;font-size:.85rem}
.msg{font-size:.8rem;margin-top:6px}
.msg.ok{color:var(--green)}.msg.err{color:var(--red)}
/* Player tabs */
.player-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.9rem}
.player-tabs button{padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:#fff;font-size:.75rem;cursor:pointer;color:var(--muted)}
.player-tabs button.active{background:var(--green);color:#fff;border-color:var(--green)}
.up{color:var(--green)}.dn{color:var(--red)}.eq{color:var(--muted)}
.pill{display:inline-block;padding:1px 6px;border-radius:8px;font-size:.65rem;font-weight:600}
.pill.q{background:#EAF3DE;color:#3B6D11}.pill.out{background:#FCE8E8;color:#A32D2D}.pill.q3{background:#FFF3E0;color:#854F0B}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px">
    <div>
      <h1>⚽ Porra Mundial 2026</h1>
      <p id="sub">Cargando...</p>
    </div>
    <button class="admin-toggle" onclick="toggleAdmin()">↑ Admin</button>
  </div>
</header>
<nav>
  <button class="active" onclick="showTab('ranking')">Clasificación</button>
  <button onclick="showTab('results')">Resultados</button>
  <button onclick="showTab('preds')">Predicciones</button>
  <button onclick="showTab('groups')">Grupos</button>
</nav>

<div class="main">
  <div id="admin-panel" style="display:none" class="admin-panel">
    <div id="admin-login">
      <p style="font-size:.8rem;color:var(--muted);margin-bottom:8px">PIN de administrador</p>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="password" id="pin-input" placeholder="PIN" onkeydown="if(event.key==='Enter')checkPin()">
        <button class="go" onclick="checkPin()">Entrar</button>
      </div>
      <p class="msg err" id="pin-msg" style="display:none">PIN incorrecto</p>
    </div>
    <div id="admin-upload" style="display:none">
      <p style="font-size:.8rem;color:var(--muted);margin-bottom:8px">Sube el Excel actualizado — todos los datos se actualizan automáticamente.</p>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <label class="upload-btn">
          📂 Subir Excel
          <input type="file" id="excel-file" accept=".xlsx" onchange="uploadExcel(this)">
        </label>
        <span id="upload-msg"></span>
      </div>
    </div>
  </div>

  <div id="tab-ranking"></div>
  <div id="tab-results" style="display:none"></div>
  <div id="tab-preds" style="display:none"></div>
  <div id="tab-groups" style="display:none"></div>
</div>

<script>
const PIN = "2026";
const GROUPS = ["A","B","C","D","E","F","G","H","I","J","K","L"];
const GM = [[0,1],[0,2],[1,2],[0,3],[1,3],[2,3]];
const AVATARS = ["#0F6E56","#185FA5","#993C1D","#534AB7","#993556","#854F0B","#3B6D11","#A32D2D"];
const FLAG = {"México":"🇲🇽","Corea del Sur":"🇰🇷","Sudáfrica":"🇿🇦","República Checa":"🇨🇿","Canadá":"🇨🇦","Suiza":"🇨🇭","Catar":"🇶🇦","Bosnia-Herzegovina":"🇧🇦","Brasil":"🇧🇷","Marruecos":"🇲🇦","Escocia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Haití":"🇭🇹","USA":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turquía":"🇹🇷","Alemania":"🇩🇪","Curaçao":"🇨🇼","Costa de Marfil":"🇨🇮","Ecuador":"🇪🇨","Países Bajos":"🇳🇱","Japón":"🇯🇵","Suecia":"🇸🇪","Túnez":"🇹🇳","Bélgica":"🇧🇪","Egipto":"🇪🇬","Irán":"🇮🇷","Nueva Zelanda":"🇳🇿","España":"🇪🇸","Cabo Verde":"🇨🇻","Arabia Saudí":"🇸🇦","Uruguay":"🇺🇾","Francia":"🇫🇷","Senegal":"🇸🇳","Irak":"🇮🇶","Noruega":"🇳🇴","Argentina":"🇦🇷","Argelia":"🇩🇿","Austria":"🇦🇹","Jordania":"🇯🇴","Portugal":"🇵🇹","R.D. Congo":"🇨🇩","Uzbekistán":"🇺🇿","Colombia":"🇨🇴","Inglaterra":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croacia":"🇭🇷","Ghana":"🇬🇭","Panamá":"🇵🇦"};

let D = null;
let currentTab = "ranking";
let selPlayer = null;
let selGroup = "A";
let adminOpen = false;
let adminAuth = false;

function groupStart(g){ let m=1; for(const gg of GROUPS){if(gg===g)return m; m+=6;} return m; }

function computeStandings(g, preds){
  const teams = D.groups[g];
  const stats = Object.fromEntries(teams.map(t=>[t,{pts:0,gf:0,gc:0,pj:0}]));
  const mid = groupStart(g);
  GM.forEach(([i,j],mi)=>{
    const t1=teams[i],t2=teams[j];
    const p=preds[String(mid+mi)]||[];
    const g1=p[0],g2=p[1];
    if(g1!=null&&g2!=null){
      stats[t1].gf+=g1;stats[t1].gc+=g2;stats[t1].pj++;
      stats[t2].gf+=g2;stats[t2].gc+=g1;stats[t2].pj++;
      if(g1>g2)stats[t1].pts+=3;else if(g1<g2)stats[t2].pts+=3;else{stats[t1].pts++;stats[t2].pts++;}
    }
  });
  return [...teams].sort((a,b)=>{
    if(stats[b].pts!==stats[a].pts)return stats[b].pts-stats[a].pts;
    const da=stats[a].gf-stats[a].gc,db=stats[b].gf-stats[b].gc;
    if(db!==da)return db-da;
    return stats[b].gf-stats[a].gf;
  }).map(t=>({team:t,...stats[t],dg:stats[t].gf-stats[t].gc}));
}

function calcMatchPts(pg1,pg2,og1,og2){
  if(pg1==null||pg2==null||og1==null||og2==null)return null;
  let pts=0;
  if(pg1===og1&&pg2===og2){pts=6;}
  else if((pg1>pg2)===(og1>og2)&&(pg1===pg2)===(og1===og2)){pts=3;}
  if(pg1===og1&&pts<6)pts++;
  if(pg2===og2&&pts<6)pts++;
  return pts;
}

function officialStandings(g){
  const off={};
  const start=groupStart(g);
  GM.forEach(([i,j],mi)=>{
    const mid=start+mi;
    const o=D.official[String(mid)];
    if(o&&o[1]!=null)off[String(mid)]=[o[1],o[2]];
  });
  return computeStandings(g,off);
}

function renderRanking(){
  const players = Object.keys(D.players);
  const ranking = [...players].sort((a,b)=>(D.players[b].total||0)-(D.players[a].total||0));
  const maxPts = D.players[ranking[0]]?.total||1;
  const medals = ["🥇","🥈","🥉"];
  let html = `<p class="section-label">Clasificación general</p>`;
  ranking.forEach((p,i)=>{
    const pts = D.players[p]?.total||0;
    const pct = Math.round(pts/maxPts*100);
    const borderStyle = i===0?'border:2px solid var(--gold)':'';
    html+=`<div class="rank-row ${i===0?'gold':''}" style="${borderStyle}" onclick="selectPlayer('${p}')">
      <div class="avatar" style="background:${AVATARS[i%8]}">${i<3?medals[i]:i+1}</div>
      <div style="flex:1;min-width:0">
        <div class="rank-name">${p}</div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
      </div>
      <div class="rank-pts"><div class="big">${pts}</div><div class="small">pts</div></div>
    </div>`;
  });
  html+=`<p style="font-size:.7rem;color:var(--muted);margin-top:4px">Toca un jugador para ver sus predicciones</p>`;
  document.getElementById('tab-ranking').innerHTML=html;
}

function renderResults(){
  let html=`<p class="section-label">Resultados oficiales</p>`;
  GROUPS.forEach(g=>{
    const start=groupStart(g);
    html+=`<div class="card" style="margin-bottom:.6rem"><p style="font-weight:600;font-size:.8rem;color:var(--green);margin-bottom:8px">Grupo ${g}</p>`;
    GM.forEach(([i,j],mi)=>{
      const mid=start+mi;
      const o=D.official[String(mid)]||[D.groups[g][i],null,null,D.groups[g][j]];
      const t1=o[0]||D.groups[g][i],t2=o[3]||D.groups[g][j];
      const g1=o[1],g2=o[2];const played=g1!=null;
      const w1=played&&g1>g2,w2=played&&g2>g1;
      html+=`<div class="match-row">
        <span class="team left" style="font-weight:${w1?'600':'400'};color:${w1?'var(--text)':'var(--muted)'}">${FLAG[t1]||''} ${t1}</span>
        <span class="score-box ${played?'played':''}">${played?g1+' – '+g2:'– –'}</span>
        <span class="team" style="font-weight:${w2?'600':'400'};color:${w2?'var(--text)':'var(--muted)'}">${FLAG[t2]||''} ${t2}</span>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('tab-results').innerHTML=html;
}

function renderPreds(){
  const players=Object.keys(D.players);
  let html=`<div class="player-tabs">`;
  players.forEach(p=>{ html+=`<button class="${p===selPlayer?'active':''}" onclick="selPlayer='${p}';renderPreds()">${p}</button>`; });
  html+=`</div>`;
  if(!selPlayer||!D.players[selPlayer]){
    html+=`<p style="color:var(--muted);font-size:.85rem">Selecciona un jugador</p>`;
    document.getElementById('tab-preds').innerHTML=html; return;
  }
  const pd=D.players[selPlayer];
  const preds=pd.predictions||{};
  // Calculate breakdown
  let ganador=0,exacto=0,goles=0,totalComp=0;
  for(let mid=1;mid<=72;mid++){
    const p=preds[String(mid)]||[];const o=D.official[String(mid)];
    if(!o||o[1]==null||p[0]==null)continue;
    const pts=calcMatchPts(p[0],p[1],o[1],o[2]);
    if(pts===6){ganador+=3;exacto+=3;totalComp+=6;}
    else if(pts>=3){ganador+=3;totalComp+=3;}
    if(pts===1||pts===2){goles+=pts;totalComp+=pts;}
    else if(pts===4){ganador+=3;goles+=1;totalComp+=4;}
    else if(pts===5){ganador+=3;goles+=2;totalComp+=5;}
  }
  html+=`<div class="pts-grid">
    <div class="pts-card"><div class="lbl">Total</div><div class="val" style="color:var(--green)">${pd.total||0}</div></div>
    <div class="pts-card"><div class="lbl">Ganador</div><div class="val" style="color:var(--blue)">${ganador}</div></div>
    <div class="pts-card"><div class="lbl">Exacto</div><div class="val" style="color:var(--purple)">${exacto}</div></div>
    <div class="pts-card"><div class="lbl">Goles</div><div class="val" style="color:var(--red)">${goles}</div></div>
  </div>`;
  GROUPS.forEach(g=>{
    const start=groupStart(g);
    html+=`<div class="card" style="margin-bottom:.6rem"><p style="font-weight:600;font-size:.8rem;color:var(--green);margin-bottom:8px">Grupo ${g}</p>`;
    GM.forEach(([i,j],mi)=>{
      const mid=start+mi;
      const pred=preds[String(mid)]||[];
      const off=D.official[String(mid)]||[D.groups[g][i],null,null,D.groups[g][j]];
      const t1=off[0]||D.groups[g][i],t2=off[3]||D.groups[g][j];
      const pg1=pred[0],pg2=pred[1],og1=off[1],og2=off[2];
      const pts=og1!=null&&pg1!=null?calcMatchPts(pg1,pg2,og1,og2):null;
      let ptColor='var(--muted)',ptLabel='';
      if(pts!==null){
        if(pts===6){ptColor='var(--green)';ptLabel='+6';}
        else if(pts>=4){ptColor='var(--blue)';ptLabel='+'+pts;}
        else if(pts>=3){ptColor='var(--blue)';ptLabel='+3';}
        else if(pts>0){ptColor='#854F0B';ptLabel='+'+pts;}
        else{ptColor='var(--muted)';ptLabel='0';}
      }
      html+=`<div class="match-row">
        <span class="team left" style="color:var(--muted)">${FLAG[t1]||''} ${t1}</span>
        <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">
          <span class="score-box">${pg1!=null?pg1+' – '+pg2:'– –'}</span>
          ${pts!==null?`<span class="pts-badge" style="color:${ptColor}">${ptLabel}</span>`:''}
        </div>
        <span class="team" style="color:var(--muted)">${FLAG[t2]||''} ${t2}</span>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('tab-preds').innerHTML=html;
}

function renderGroups(){
  let html=`<p class="section-label">Grupos</p>
  <div class="group-tabs">`;
  GROUPS.forEach(g=>{ html+=`<button class="${g===selGroup?'active':''}" onclick="selGroup='${g}';renderGroups()">Gr.${g}</button>`; });
  html+=`</div>`;
  // Official standings
  const st=officialStandings(selGroup);
  html+=`<div class="card" style="margin-bottom:1rem"><p style="font-weight:600;font-size:.8rem;color:var(--green);margin-bottom:8px">Clasificación oficial – Grupo ${selGroup}</p>
  <table><thead><tr><th></th><th class="left">Equipo</th><th>PJ</th><th>Pts</th><th>DG</th><th>GF</th></tr></thead><tbody>`;
  st.forEach((row,i)=>{
    const pos=i<2?'<span class="pill q">✓</span>':i===2?'<span class="pill q3">↗</span>':'<span class="pill out">–</span>';
    const dg=row.dg>0?'+'+row.dg:row.dg;
    html+=`<tr><td>${pos}</td><td class="left">${FLAG[row.team]||''} ${row.team}</td><td>${row.pj}</td><td style="font-weight:600">${row.pts}</td><td style="color:${row.dg>=0?'var(--green)':'var(--red)'}">${dg}</td><td>${row.gf}</td></tr>`;
  });
  html+=`</tbody></table><p style="font-size:.65rem;color:var(--muted);margin-top:6px">✓ clasificado &nbsp; ↗ posible mejor 3°</p></div>`;
  // All players' predictions for this group
  const players=Object.keys(D.players);
  html+=`<p class="section-label">Predicciones de todos</p><div class="card"><div style="overflow-x:auto"><table style="min-width:300px"><thead><tr><th class="left">Jugador</th><th>1°</th><th>2°</th><th>3°</th><th>4°</th></tr></thead><tbody>`;
  players.forEach(p=>{
    const preds=D.players[p]?.predictions||{};
    const pSt=computeStandings(selGroup,preds);
    html+=`<tr><td class="left" style="font-weight:600">${p}</td>`;
    pSt.forEach((row,i)=>{
      html+=`<td style="font-size:.72rem">${FLAG[row.team]||''}<br><span style="color:var(--muted)">${row.team.split(' ')[0]}</span></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div></div>`;
  document.getElementById('tab-groups').innerHTML=html;
}

function selectPlayer(p){ selPlayer=p; showTab('preds'); }

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('nav button').forEach((b,i)=>{
    b.classList.toggle('active',['ranking','results','preds','groups'][i]===tab);
  });
  ['ranking','results','preds','groups'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
  });
  renderTab(tab);
}

function renderTab(tab){
  if(tab==='ranking')renderRanking();
  else if(tab==='results')renderResults();
  else if(tab==='preds')renderPreds();
  else if(tab==='groups')renderGroups();
}

function toggleAdmin(){ adminOpen=!adminOpen; document.getElementById('admin-panel').style.display=adminOpen?'block':'none'; }

function checkPin(){
  const v=document.getElementById('pin-input').value;
  if(v===PIN){
    adminAuth=true;
    document.getElementById('admin-login').style.display='none';
    document.getElementById('admin-upload').style.display='block';
    document.getElementById('pin-msg').style.display='none';
  } else {
    document.getElementById('pin-msg').style.display='block';
  }
}

function uploadExcel(input){
  const file=input.files[0]; if(!file)return;
  const msgEl=document.getElementById('upload-msg');
  msgEl.textContent='Procesando...';msgEl.className='msg';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const newD=parseExcel(wb);
      D=newD;
      renderTab(currentTab);
      updateSub();
      msgEl.textContent='✓ Actualizado correctamente';msgEl.className='msg ok';
    }catch(err){
      msgEl.textContent='Error: '+err.message;msgEl.className='msg err';
    }
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

function parseExcel(wb){
  const GROUPS_DATA={"A":["México","Corea del Sur","Sudáfrica","República Checa"],"B":["Canadá","Suiza","Catar","Bosnia-Herzegovina"],"C":["Brasil","Marruecos","Escocia","Haití"],"D":["USA","Paraguay","Australia","Turquía"],"E":["Alemania","Curaçao","Costa de Marfil","Ecuador"],"F":["Países Bajos","Japón","Suecia","Túnez"],"G":["Bélgica","Egipto","Irán","Nueva Zelanda"],"H":["España","Cabo Verde","Arabia Saudí","Uruguay"],"I":["Francia","Senegal","Irak","Noruega"],"J":["Argentina","Argelia","Austria","Jordania"],"K":["Portugal","R.D. Congo","Uzbekistán","Colombia"],"L":["Inglaterra","Croacia","Ghana","Panamá"]};
  const PLAYER_NAMES=["Tamayo","Vispo","Juanpa","Macaco","Aranguren","Arocena","Alonso","Quemada"];
  const official={};
  const wsRes=wb.Sheets["🏟️ Resultados Oficiales"];
  if(wsRes){
    const rows=XLSX.utils.sheet_to_json(wsRes,{header:1,raw:true});
    rows.forEach(row=>{
      if(typeof row[0]==='number'&&row[0]>=1&&row[0]<=72){
        official[String(row[0])]=[row[1],row[2]!=null?Number(row[2]):null,row[4]!=null?Number(row[4]):null,row[5]];
      }
    });
  }
  const players={};
  PLAYER_NAMES.forEach(p=>{
    const ws=wb.Sheets[p]; if(!ws)return;
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
    const preds={};
    rows.forEach(row=>{
      if(typeof row[0]==='number'&&row[0]>=1&&row[0]<=72)
        preds[String(row[0])]=[row[2]!=null?Number(row[2]):null,row[4]!=null?Number(row[4]):null];
    });
    // Get total from E459
    const totalCell=ws['E459'];
    const total=totalCell?Number(totalCell.v)||0:0;
    players[p]={total,predictions:preds};
  });
  return{groups:GROUPS_DATA,group_order:["A","B","C","D","E","F","G","H","I","J","K","L"],official,players};
}

function updateSub(){
  const scored=Object.values(D.official||{}).filter(v=>v[1]!=null).length;
  document.getElementById('sub').textContent=scored+' de 72 partidos jugados';
}

// Load data
fetch('data.json?v='+Date.now())
  .then(r=>r.json())
  .then(d=>{ D=d; renderTab('ranking'); updateSub(); })
  .catch(()=>{ document.getElementById('sub').textContent='Error cargando datos'; });
</script>
