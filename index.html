<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porra Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --usa:#002868;--can:#D80621;--mex:#006847;
  --gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32;
  --bg:#080d1a;--card:#0f1829;--card2:#151f35;--border:#1e2d47;
  --text:#e8f0ff;--muted:#6b7fa8;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
header{position:sticky;top:0;z-index:20;overflow:hidden;
  background:linear-gradient(135deg,#001040 0%,#0a0020 40%,#200008 70%,#4a0010 100%);
  box-shadow:0 4px 30px rgba(0,0,0,.6)}
.hglow{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 25% 50%,rgba(0,40,104,.5),transparent 55%),
             radial-gradient(ellipse at 75% 50%,rgba(216,6,33,.35),transparent 55%)}
.hinner{position:relative;display:flex;align-items:center;gap:12px;padding:12px 16px 16px}
.ball{font-size:2.4rem;animation:spin 8s linear infinite;display:inline-block;
  filter:drop-shadow(0 0 14px rgba(255,215,0,.6))}
@keyframes spin{to{transform:rotate(360deg)}}
.htitle h1{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.06em;
  background:linear-gradient(90deg,#c8d8ff,var(--gold),#ffaaaa,var(--gold),#c8d8ff);
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 5s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:0%}50%{background-position:100%}}
.htitle .sub{font-size:.72rem;color:#8899bb;margin-top:2px}
.flags{font-size:1.1rem;margin-top:4px;display:flex;gap:5px}
.pbar{height:3px;background:rgba(255,255,255,.07)}
.pbfill{height:100%;background:linear-gradient(90deg,var(--mex),var(--usa),var(--can));
  transition:width 1s;position:relative}
.pbfill::after{content:'';position:absolute;right:-3px;top:-3px;
  width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold)}
nav{display:flex;gap:5px;padding:.6rem .9rem;background:#090e1c;
  border-bottom:1px solid var(--border);overflow-x:auto;
  position:sticky;top:78px;z-index:19}
nav::-webkit-scrollbar{display:none}
nav button{padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;font-size:.75rem;cursor:pointer;white-space:nowrap;
  color:var(--muted);font-weight:500;font-family:'Inter',sans-serif;transition:all .2s}
nav button:hover{border-color:var(--gold);color:var(--gold)}
nav button.active{background:linear-gradient(90deg,#001a60,#6b0015,#8B0010);
  color:#fff;border-color:transparent;box-shadow:0 0 14px rgba(216,6,33,.3)}
.main{max-width:700px;margin:0 auto;padding:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:.9rem 1rem;margin-bottom:.75rem;box-shadow:0 2px 16px rgba(0,0,0,.4)}
.slabel{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.1em;color:var(--gold)}
.shdr{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
.divider{height:2px;margin:1rem 0;border-radius:2px;
  background:linear-gradient(90deg,var(--mex),transparent 33%,var(--usa),transparent 67%,var(--can))}
/* PODIUM */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;
  margin-bottom:1.2rem;padding:.5rem 0}
.pslot{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;max-width:180px}
.pslot.first{order:2}.pslot.second{order:1}.pslot.third{order:3}
.pname{font-size:.78rem;font-weight:700;text-align:center}
.ppts{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold)}
.pdiff{font-size:.6rem;color:var(--can);font-weight:600}
.pavatar{border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .2s}
.pavatar:hover{transform:scale(1.1)}
.pslot.first .pavatar{width:72px;height:72px;font-size:1.6rem;
  background:linear-gradient(135deg,#a07000,var(--gold),#ffa500);
  box-shadow:0 0 28px rgba(255,215,0,.6)}
.pslot.second .pavatar{width:58px;height:58px;font-size:1.3rem;
  background:linear-gradient(135deg,#555,var(--silver),#ccc)}
.pslot.third .pavatar{width:48px;height:48px;font-size:1.1rem;
  background:linear-gradient(135deg,#7a4d1d,var(--bronze),#c8833a)}
.pbase{border-radius:8px 8px 0 0;width:100%;display:flex;align-items:center;
  justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:rgba(255,255,255,.9)}
.pslot.first .pbase{height:68px;background:linear-gradient(180deg,#9a7200,#4a3600)}
.pslot.second .pbase{height:52px;background:linear-gradient(180deg,#555,#252525)}
.pslot.third .pbase{height:38px;background:linear-gradient(180deg,#6a3d10,#3a1e08)}
/* RANK ROWS */
.rwrap{margin-bottom:.4rem}
.rrow{display:flex;align-items:center;gap:10px;padding:.65rem .9rem;border-radius:10px;
  background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.rrow:hover,.rrow.open{border-color:#4a7bd5;background:var(--card2)}
.rrow.open{border-radius:10px 10px 0 0;border-bottom-color:transparent}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;color:#fff;font-weight:700;font-size:.85rem;flex-shrink:0}
.rname{font-weight:600;font-size:.9rem}
.rdiff{font-size:.65rem;font-weight:700;color:var(--can)}
.rbar{height:3px;background:#1a2540;border-radius:2px;overflow:hidden;margin-top:4px}
.rbarfill{height:100%;border-radius:2px;transition:width .6s;
  background:linear-gradient(90deg,var(--usa),var(--can))}
.rpts{text-align:right;flex-shrink:0}
.rpts .big{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;line-height:1;color:var(--gold)}
.rpts .sm{font-size:.6rem;color:var(--muted)}
.rarrow{font-size:.6rem;color:var(--muted);margin-left:3px;
  display:inline-block;transition:transform .2s}
.rrow.open .rarrow{transform:rotate(180deg);color:var(--gold)}
/* BREAKDOWN */
.bd{display:none;padding:.85rem .9rem;background:var(--card2);
  border:1px solid #4a7bd5;border-top:none;border-radius:0 0 10px 10px}
.bd.open{display:block;animation:slideDown .18s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.bdtitle{font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:.08em;
  color:var(--muted);margin-bottom:8px}
.bdchips{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}
.bdchip{background:#080d1a;border-radius:8px;padding:6px 8px;text-align:center;
  border:1px solid var(--border)}
.bdchip .lbl{font-size:.55rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:2px}
.bdchip .val{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;line-height:1}
.bdgroups{display:flex;flex-direction:column;gap:3px}
.bdgrow{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:7px;
  background:#080d1a;border:1px solid var(--border);flex-wrap:wrap}
.bdglbl{font-size:.68rem;font-weight:700;color:var(--muted);flex-shrink:0;width:38px}
.bdgtags{display:flex;gap:3px;flex-wrap:wrap;flex:1}
.tag{font-size:.58rem;padding:2px 6px;border-radius:5px;font-weight:600;white-space:nowrap}
.tw{background:rgba(0,40,104,.4);color:#7ab3ff;border:1px solid rgba(58,123,213,.3)}
.tp{background:rgba(0,130,80,.25);color:#4fd8a0;border:1px solid rgba(0,130,80,.3)}
.teq{background:rgba(255,165,0,.15);color:#ffb84d;border:1px solid rgba(255,165,0,.28)}
.tb{background:rgba(255,215,0,.18);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.tt{background:rgba(216,6,33,.18);color:#ff7070;border:1px solid rgba(216,6,33,.28);font-size:.62rem}
/* MATCH ROWS */
.mrow{display:flex;align-items:center;gap:6px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04);font-size:.78rem}
.mrow:last-child{border-bottom:none}
.team{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)}
.team.left{text-align:right}
.sbox{background:#080d1a;border:1px solid var(--border);border-radius:6px;
  padding:2px 8px;font-size:.78rem;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0}
.sbox.played{font-weight:700;border-color:#3a7bd5;color:#fff}
.pbadge{font-size:.72rem;font-weight:700;text-align:center;font-family:'Bebas Neue',sans-serif}
/* GROUPS */
.gtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.9rem}
.gtabs button{padding:4px 10px;border-radius:14px;border:1px solid var(--border);
  background:transparent;font-size:.72rem;cursor:pointer;color:var(--muted);transition:all .15s}
.gtabs button:hover{border-color:var(--gold);color:var(--gold)}
.gtabs button.active{background:linear-gradient(90deg,#004d30,var(--mex));color:#fff;border-color:transparent}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{text-align:center;color:var(--muted);font-weight:500;font-size:.65rem;
  padding:4px 5px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
th.L{text-align:left}
td{text-align:center;padding:5px;border-bottom:1px solid rgba(255,255,255,.04)}
td.L{text-align:left}
tr:last-child td{border-bottom:none}
.pill{display:inline-block;padding:2px 6px;border-radius:7px;font-size:.6rem;font-weight:700}
.pq{background:rgba(0,104,71,.3);color:#5fca99;border:1px solid rgba(0,104,71,.5)}
.pout{background:rgba(216,6,33,.2);color:#ff7070;border:1px solid rgba(216,6,33,.3)}
.pq3{background:rgba(255,165,0,.15);color:#ffb84d;border:1px solid rgba(255,165,0,.3)}
.ghdr{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.06em;margin-bottom:8px;
  background:linear-gradient(90deg,var(--mex),#00b37a);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.rhdr{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.06em;
  color:#6fa8ff;margin-bottom:8px}
/* PLAYER TABS */
.ptabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.9rem}
.ptabs button{padding:5px 12px;border-radius:14px;border:1px solid var(--border);
  background:transparent;font-size:.75rem;cursor:pointer;color:var(--muted);transition:all .15s}
.ptabs button:hover{border-color:var(--can);color:var(--can)}
.ptabs button.active{background:linear-gradient(90deg,var(--usa),var(--can));
  color:#fff;border-color:transparent}
.ptsgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.9rem}
.ptsc{background:#080d1a;border-radius:8px;padding:8px 10px;border:1px solid var(--border)}
.ptsc .lbl{font-size:.6rem;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.ptsc .val{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;line-height:1}
/* PRIZES */
.prize-hero{text-align:center;padding:1.4rem;border-radius:14px;margin-bottom:.75rem;
  background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(216,6,33,.06),rgba(0,40,104,.08));
  border:1px solid rgba(255,215,0,.2)}
.matchup{display:flex;align-items:center;padding:.75rem 1rem;
  background:var(--card2);border-radius:12px;border:1px solid var(--border);
  margin-bottom:.5rem;gap:8px}
.mu-loser{flex:1;font-weight:600;font-size:.85rem;color:var(--can)}
.mu-beers{text-align:center;flex-shrink:0;min-width:70px}
.mu-winner{flex:1;font-weight:600;font-size:.85rem;color:var(--gold);text-align:right}
.mu-sub{font-size:.6rem;color:var(--muted);margin-top:1px}
.prizes-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.pcard{border-radius:12px;padding:.85rem 1rem;border:1px solid;position:relative;overflow:hidden}
.pcard.win{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(0,40,104,.08));
  border-color:rgba(255,215,0,.25)}
.pcard.lose{background:linear-gradient(135deg,rgba(216,6,33,.1),rgba(0,0,0,.05));
  border-color:rgba(216,6,33,.2)}
.pc-pos{font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:.05em}
.pc-name{font-size:.95rem;font-weight:700;margin-bottom:2px}
.pc-pts{font-size:.72rem;color:var(--muted);margin-bottom:3px}
.pc-detail{font-size:.68rem}
.pc-beer{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:1.3rem;opacity:.65}
/* EVOLUTION */
.evo-outer{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:1rem;margin-bottom:.75rem}
.evo-canvas-wrap{position:relative;width:100%;
  height:clamp(300px,48vh,500px);margin-bottom:.75rem;
  background:#050a15;border-radius:10px;border:1px solid var(--border);overflow:hidden}
#evo-canvas{width:100%;height:100%;display:block;cursor:crosshair}
.evo-crosshair{position:absolute;top:0;bottom:0;width:1px;
  background:rgba(255,255,255,.2);pointer-events:none;display:none}
.evo-tooltip{position:absolute;top:8px;background:rgba(5,10,21,.96);
  border:1px solid var(--border);border-radius:10px;padding:8px 11px;
  font-size:.72rem;pointer-events:none;display:none;z-index:5;
  box-shadow:0 4px 20px rgba(0,0,0,.6);min-width:200px;max-width:260px}
.tt-match{font-weight:700;color:var(--gold);margin-bottom:6px;font-size:.75rem;
  border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:4px}
.tt-row{display:flex;justify-content:space-between;align-items:center;
  gap:10px;padding:2px 0}
.tt-name{font-weight:600;font-size:.72rem}
.tt-right{text-align:right;flex-shrink:0}
.tt-cum{font-family:'Bebas Neue',sans-serif;font-size:.95rem;line-height:1}
.tt-gain{font-size:.6rem;color:var(--muted)}
.evo-legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.75rem}
.evo-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;
  border-radius:10px;border:1px solid;background:transparent;cursor:pointer;
  font-size:.72rem;font-family:'Inter',sans-serif;transition:all .18s;color:var(--text)}
.evo-btn.dimmed{opacity:.2}
.evo-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* mini ranking */
.evo-ranking{display:flex;flex-direction:column;gap:4px}
.evo-rank-row{display:flex;align-items:center;gap:8px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04);transition:all .15s}
.evo-rank-row:last-child{border-bottom:none}
.evo-rank-n{width:20px;text-align:center;font-family:'Bebas Neue',sans-serif;
  font-size:.9rem;flex-shrink:0}
.evo-rank-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.evo-rank-bar-wrap{flex:1;height:3px;background:#1a2540;border-radius:2px;overflow:hidden}
.evo-rank-bar{height:100%;border-radius:2px;transition:width .3s}
.evo-rank-pts{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;flex-shrink:0;text-align:right;min-width:36px}
/* ADMIN */
.upload-zone{border:1.5px dashed var(--border);border-radius:10px;padding:1.2rem;
  text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:.5rem}
.upload-zone:hover{border-color:var(--gold)}
input[type=password]{padding:6px 10px;border:1px solid var(--border);border-radius:8px;
  font-size:.85rem;width:120px;background:var(--card2);color:var(--text)}
button.go{padding:6px 14px;border-radius:8px;border:none;
  background:linear-gradient(90deg,var(--usa),var(--can));color:#fff;cursor:pointer;font-size:.85rem}
.msg{font-size:.78rem;margin-top:5px}
.msg.ok{color:#5fca99}.msg.err{color:var(--can)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#1e2d47;border-radius:2px}
</style>
</head>
<body>
<header>
  <div class="hglow"></div>
  <div class="hinner">
    <div class="ball">⚽</div>
    <div class="htitle">
      <h1>PORRA MUNDIAL 2026</h1>
      <div class="sub" id="sub">Cargando...</div>
      <div class="flags">🇲🇽🇺🇸🇨🇦</div>
    </div>
  </div>
  <div class="pbar"><div class="pbfill" id="pbfill" style="width:0%"></div></div>
</header>
<nav>
  <button class="active" onclick="showTab('ranking')">🏆 Clasificación</button>
  <button onclick="showTab('results')">📅 Resultados</button>
  <button onclick="showTab('preds')">🔮 Predicciones</button>
  <button onclick="showTab('groups')">👥 Grupos</button>
  <button onclick="showTab('evo')">📈 Evolución</button>
  <button onclick="showTab('prizes')">🍺 Premios</button>
  <button onclick="showTab('admin')" style="margin-left:auto">⚙</button>
</nav>
<div class="main">
  <div id="tab-ranking"></div>
  <div id="tab-results"  style="display:none"></div>
  <div id="tab-preds"    style="display:none"></div>
  <div id="tab-groups"   style="display:none"></div>
  <div id="tab-evo"      style="display:none"></div>
  <div id="tab-prizes"   style="display:none"></div>
  <div id="tab-admin"    style="display:none"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONSTANTS & STATE
═══════════════════════════════════════════════════════════════ */
const GROUPS=["A","B","C","D","E","F","G","H","I","J","K","L"];
const GM=[[0,1],[0,2],[1,2],[0,3],[1,3],[2,3]];
const AV=[
  "linear-gradient(135deg,#002868,#3a7bd5)",
  "linear-gradient(135deg,#D80621,#ff6680)",
  "linear-gradient(135deg,#006847,#00b37a)",
  "linear-gradient(135deg,#534AB7,#9088e0)",
  "linear-gradient(135deg,#7a4d1d,#CD7F32)",
  "linear-gradient(135deg,#3B6D11,#6db521)",
  "linear-gradient(135deg,#993556,#e05580)",
  "linear-gradient(135deg,#185FA5,#4a9fe0)"
];
const ECOLS=["#4a8fff","#ff4466","#00cc88","#aa88ff","#ffaa33","#44dd44","#ff66aa","#33aaff"];
const FLAG={
  "México":"🇲🇽","Corea del Sur":"🇰🇷","Sudáfrica":"🇿🇦","República Checa":"🇨🇿",
  "Canadá":"🇨🇦","Suiza":"🇨🇭","Catar":"🇶🇦","Bosnia-Herzegovina":"🇧🇦",
  "Brasil":"🇧🇷","Marruecos":"🇲🇦","Escocia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Haití":"🇭🇹",
  "USA":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turquía":"🇹🇷",
  "Alemania":"🇩🇪","Curaçao":"🇨🇼","Costa de Marfil":"🇨🇮","Ecuador":"🇪🇨",
  "Países Bajos":"🇳🇱","Japón":"🇯🇵","Suecia":"🇸🇪","Túnez":"🇹🇳",
  "Bélgica":"🇧🇪","Egipto":"🇪🇬","Irán":"🇮🇷","Nueva Zelanda":"🇳🇿",
  "España":"🇪🇸","Cabo Verde":"🇨🇻","Arabia Saudí":"🇸🇦","Uruguay":"🇺🇾",
  "Francia":"🇫🇷","Senegal":"🇸🇳","Irak":"🇮🇶","Noruega":"🇳🇴",
  "Argentina":"🇦🇷","Argelia":"🇩🇿","Austria":"🇦🇹","Jordania":"🇯🇴",
  "Portugal":"🇵🇹","R.D. Congo":"🇨🇩","Uzbekistán":"🇺🇿","Colombia":"🇨🇴",
  "Inglaterra":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croacia":"🇭🇷","Ghana":"🇬🇭","Panamá":"🇵🇦"
};

let D=null,curTab="ranking",selPlayer=null,selGroup="A",openPlayer=null;
let adminAuth=false,evoHL=null,evoResizeTimer=null;

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
function gstart(g){let m=1;for(const gg of GROUPS){if(gg===g)return m;m+=6;}return m;}

function standings(g,preds){
  const teams=D.groups[g];
  const st=Object.fromEntries(teams.map(t=>[t,{pts:0,gf:0,gc:0,pj:0}]));
  const mid=gstart(g);
  GM.forEach(([i,j],mi)=>{
    const t1=teams[i],t2=teams[j],p=preds[String(mid+mi)]||[];
    const g1=p[0],g2=p[1];if(g1==null||g2==null)return;
    st[t1].gf+=g1;st[t1].gc+=g2;st[t1].pj++;
    st[t2].gf+=g2;st[t2].gc+=g1;st[t2].pj++;
    if(g1>g2)st[t1].pts+=3;else if(g1<g2)st[t2].pts+=3;
    else{st[t1].pts++;st[t2].pts++;}
  });
  return [...teams].sort((a,b)=>{
    if(st[b].pts!==st[a].pts)return st[b].pts-st[a].pts;
    const da=st[a].gf-st[a].gc,db=st[b].gf-st[b].gc;
    if(db!==da)return db-da;return st[b].gf-st[a].gf;
  }).map(t=>({team:t,...st[t],dg:st[t].gf-st[t].gc}));
}

function offSt(g){
  const off={};const s=gstart(g);
  GM.forEach(([i,j],mi)=>{
    const m=s+mi,o=D.official[String(m)];
    if(o&&o[1]!=null)off[String(m)]=[o[1],o[2]];
  });
  return standings(g,off);
}

function mpts(pg1,pg2,og1,og2){
  if(pg1==null||pg2==null||og1==null||og2==null)return null;
  let p=0;
  if(pg1===og1&&pg2===og2)p=6;
  else if((pg1>pg2)===(og1>og2)&&(pg1===pg2)===(og1===og2))p=3;
  if(pg1===og1&&p<6)p++;if(pg2===og2&&p<6)p++;return p;
}

function ptsBreakdown(preds){
  let gan=0,ex=0,gl=0;
  for(let m=1;m<=72;m++){
    const p=preds[String(m)]||[],o=D.official[String(m)];
    if(!o||o[1]==null||p[0]==null)continue;
    const pts=mpts(p[0],p[1],o[1],o[2]);
    if(pts===6){gan+=3;ex+=3;}else if(pts>=3)gan+=3;
    if(pts===1||pts===2)gl+=pts;
    else if(pts===4)gl+=1;
    else if(pts===5)gl+=2;
  }
  return{gan,ex,gl};
}

/* ═══════════════════════════════════════════════════════════════
   BREAKDOWN (inside ranking rows)
═══════════════════════════════════════════════════════════════ */
function bdHTML(pname){
  const pd=D.players[pname];if(!pd)return'';
  const isOpen=openPlayer===pname;
  const preds=pd.predictions||{};
  const {gan,ex,gl}=ptsBreakdown(preds);
  const gb=pd.groups_breakdown||{};
  let totPos=0,totBon=0,totEq=0;
  GROUPS.forEach(g=>{
    totPos+=(gb[g]?.pos_pts||0);
    totBon+=(gb[g]?.bonus||0);
    totEq+=(gb[g]?.team_pts||0);
  });
  let grows='';
  GROUPS.forEach(g=>{
    const gd=gb[g]||{};
    const gs=gstart(g);
    let matchP=0;
    GM.forEach(([i,j],mi)=>{
      const mid=gs+mi,o=D.official[String(mid)],pr=preds[String(mid)]||[];
      if(!o||o[1]==null||pr[0]==null)return;
      matchP+=mpts(pr[0],pr[1],o[1],o[2])||0;
    });
    const tot=matchP+(gd.pos_pts||0)+(gd.bonus||0)+(gd.team_pts||0);
    if(tot===0)return;
    let tags='';
    if(matchP>0)tags+=`<span class="tag tw">⚽ +${matchP}</span>`;
    if((gd.pos_pts||0)>0)tags+=`<span class="tag tp">📍 +${gd.pos_pts}</span>`;
    if((gd.team_pts||0)>0)tags+=`<span class="tag teq">🎯 +${gd.team_pts}</span>`;
    if((gd.bonus||0)>0)tags+=`<span class="tag tb">🏆 +${gd.bonus} BONUS</span>`;
    grows+=`<div class="bdgrow"><span class="bdglbl">GRP ${g}</span><div class="bdgtags">${tags}<span class="tag tt">${tot}pts</span></div></div>`;
  });
  return `<div class="bd ${isOpen?'open':''}" id="bd-${pname}">
    <div class="bdtitle">DESGLOSE DE PUNTOS</div>
    <div class="bdchips">
      <div class="bdchip"><div class="lbl">Ganador</div><div class="val" style="color:#7ab3ff">${gan}</div></div>
      <div class="bdchip"><div class="lbl">Exacto</div><div class="val" style="color:#b8adff">${ex}</div></div>
      <div class="bdchip"><div class="lbl">Goles</div><div class="val" style="color:#5fca99">${gl}</div></div>
      <div class="bdchip"><div class="lbl">Posiciones</div><div class="val" style="color:#4fd8a0">${totPos}</div></div>
      <div class="bdchip"><div class="lbl">Equipos</div><div class="val" style="color:#ffb84d">${totEq}</div></div>
      <div class="bdchip"><div class="lbl">Bonus</div><div class="val" style="color:var(--gold)">${totBon}</div></div>
    </div>
    <div class="bdgroups">${grows}</div>
  </div>`;
}

function evoDrawChart(hoverIdx){
  const canvas=document.getElementById('evo-canvas');
  if(!canvas)return;
  const wrap=document.getElementById('evo-wrap');
  if(!wrap)return;
  const dpr=window.devicePixelRatio||1;
  const W=wrap.offsetWidth,H=wrap.offsetHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const players=Object.keys(D.players);
  const scored=D.scored_chrono||[];
  const n=scored.length;
  if(!n){
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='14px Inter';
    ctx.textAlign='center';ctx.fillText('Sin partidos jugados aún',W/2,H/2);
    return;
  }

  const PAD={t:14,r:16,b:32,l:42};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;

  const maxPts=Math.max(...players.map(p=>{
    const h=D.players[p]?.match_history||[];
    return h.length?h[h.length-1].cum:0;
  }),10);

  // Grid
  for(let i=0;i<=5;i++){
    const v=Math.round(maxPts*i/5);
    const y=PAD.t+cH*(1-i/5);
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.25)';ctx.font=`${9}px Inter`;ctx.textAlign='right';
    ctx.fillText(v,PAD.l-4,y+3);
  }

  // Hover vertical line
  if(hoverIdx!=null&&hoverIdx>=0&&hoverIdx<n){
    const hx=PAD.l+cW*(hoverIdx/(n-1||1));
    ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(hx,PAD.t);ctx.lineTo(hx,H-PAD.b);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Lines
  players.forEach((p,pi)=>{
    const hist=D.players[p]?.match_history||[];
    if(!hist.length)return;
    const col=ECOLS[pi%ECOLS.length];
    const hl=(evoHL===null||evoHL===pi);
    ctx.globalAlpha=hl?1:.08;
    ctx.strokeStyle=col;ctx.lineWidth=hl?2.5:1;ctx.lineJoin='round';
    ctx.beginPath();
    hist.forEach((pt,idx)=>{
      const x=PAD.l+cW*(idx/(n-1||1));
      const y=PAD.t+cH*(1-pt.cum/maxPts);
      idx===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
    // Hover dot
    if(hl&&hoverIdx!=null&&hoverIdx<hist.length){
      const pt=hist[hoverIdx];
      const hx=PAD.l+cW*(hoverIdx/(n-1||1));
      const hy=PAD.t+cH*(1-pt.cum/maxPts);
      ctx.beginPath();ctx.arc(hx,hy,5,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();
    }
    // End dot + label
    if(hl){
      const last=hist[hist.length-1];
      const ex=PAD.l+cW*((hist.length-1)/(n-1||1));
      const ey=PAD.t+cH*(1-last.cum/maxPts);
      ctx.beginPath();ctx.arc(ex,ey,hl&&evoHL===pi?5:3,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();
      if(evoHL===pi){
        ctx.globalAlpha=1;
        ctx.font='bold 10px Inter';ctx.fillStyle=col;
        ctx.textAlign=ex>W-70?'right':'left';
        ctx.fillText(`${p} ${last.cum}`,ex+(ex>W-70?-8:8),ey-6);
      }
    }
    ctx.globalAlpha=1;
  });

  // X axis: match numbers at intervals
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='8px Inter';
  const step=Math.ceil(n/10);
  for(let idx=0;idx<n;idx+=step){
    const x=PAD.l+cW*(idx/(n-1||1));
    ctx.fillText(`P${scored[idx]}`,x,H-PAD.b+14);
  }
}

function evoUpdateRanking(hoverIdx){
  const players=Object.keys(D.players);
  const scored=D.scored_chrono||[];
  // Build current pts at hoverIdx
  const ptsAtIdx=players.map((p,pi)=>{
    const hist=D.players[p]?.match_history||[];
    const entry=hoverIdx!=null&&hoverIdx<hist.length?hist[hoverIdx]:hist[hist.length-1];
    return{p,pi,cum:entry?.cum||0,gain:entry?.pts||0};
  }).sort((a,b)=>b.cum-a.cum);

  const topCum=ptsAtIdx[0]?.cum||1;
  ptsAtIdx.forEach((r,rank)=>{
    const ptsEl=document.getElementById(`evo-pts-${r.pi}`);
    const barEl=document.getElementById(`evo-bar-${r.pi}`);
    const rowEl=document.getElementById(`evo-rank-${r.pi}`);
    if(ptsEl)ptsEl.textContent=r.cum+(r.gain>0&&hoverIdx!=null?` (+${r.gain})`:'');
    if(barEl)barEl.style.width=`${Math.round(r.cum/topCum*100)}%`;
  });
}

function evoSetupInteraction(){
  const canvas=document.getElementById('evo-canvas');
  const tooltip=document.getElementById('evo-tooltip');
  const crosshair=document.getElementById('evo-crosshair');
  const wrap=document.getElementById('evo-wrap');
  if(!canvas||!tooltip||!crosshair||!wrap)return;

  const players=Object.keys(D.players);
  const scored=D.scored_chrono||[];
  const n=scored.length;
  if(!n)return;

  function getIdx(clientX){
    const rect=canvas.getBoundingClientRect();
    const W=wrap.offsetWidth;
    const PAD={l:42,r:16};
    const cW=W-PAD.l-PAD.r;
    const relX=clientX-rect.left-PAD.l;
    return Math.max(0,Math.min(n-1,Math.round(relX/cW*(n-1))));
  }

  function show(clientX){
    const idx=getIdx(clientX);
    const mid=scored[idx];
    const lbl=(D.match_labels||{})[String(mid)]||`Partido ${mid}`;
    const W=wrap.offsetWidth;
    const PAD={l:42,r:16};
    const cx=PAD.l+(W-PAD.l-PAD.r)*(idx/(n-1||1));

    // Update crosshair
    crosshair.style.left=cx+'px';crosshair.style.display='block';

    // Rows sorted by pts at this idx
    const rows=players.map((p,pi)=>{
      const hist=D.players[p]?.match_history||[];
      const entry=hist[idx]||hist[hist.length-1]||{cum:0,pts:0};
      return{p,pi,cum:entry.cum,gain:entry.pts};
    }).sort((a,b)=>b.cum-a.cum);

    let ttHtml=`<div class="tt-match">⚽ ${lbl}</div>`;
    rows.forEach((r,rank)=>{
      const col=ECOLS[r.pi%ECOLS.length];
      const gainStr=r.gain>0?`+${r.gain}`:'–';
      ttHtml+=`<div class="tt-row">
        <span class="tt-name" style="color:${col}">${rank+1}. ${r.p}</span>
        <span class="tt-right">
          <span class="tt-cum" style="color:${col}">${r.cum}</span>
          <span class="tt-gain"> (${gainStr})</span>
        </span>
      </div>`;
    });
    tooltip.innerHTML=ttHtml;
    tooltip.style.display='block';

    // Position tooltip
    const ttW=220;
    let tleft=cx+12;if(tleft+ttW>W)tleft=cx-ttW-12;
    tooltip.style.left=Math.max(0,tleft)+'px';

    // Redraw with hover highlight
    evoDrawChart(idx);
    evoUpdateRanking(idx);
  }

  function hide(){
    tooltip.style.display='none';crosshair.style.display='none';
    evoDrawChart(null);evoUpdateRanking(null);
  }

  canvas.addEventListener('mousemove',e=>show(e.clientX));
  canvas.addEventListener('mouseleave',hide);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();show(e.touches[0].clientX);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();show(e.touches[0].clientX);},{passive:false});
  canvas.addEventListener('touchend',()=>setTimeout(hide,2000));

  // Resize
  window.addEventListener('resize',()=>{
    clearTimeout(evoResizeTimer);
    evoResizeTimer=setTimeout(()=>{if(curTab==='evo')evoDrawChart(null);},200);
  },{passive:true});
}

function evoToggle(pi){
  evoHL=evoHL===pi?null:pi;
  document.querySelectorAll('.evo-btn').forEach((btn,i)=>{
    btn.classList.toggle('dimmed',evoHL!==null&&evoHL!==i);
  });
  evoDrawChart(null);
}

    ['🙂 COBRA','2 cervezas del 6°','#4fd8a0'],['👍 COBRA','1 cerveza del 5°','#7ab3ff'],

function upXlsx(input){
  const file=input.files[0];if(!file)return;
  const el=document.getElementById('upmsg');
  if(el){el.textContent='Procesando...';el.className='msg';}
  const r=new FileReader();
  r.onload=function(e){
    try{
      const XLSX_LIB=typeof XLSX!=='undefined'?XLSX:null;
      if(!XLSX_LIB)throw new Error('Librería XLSX no cargada');
      const wb=XLSX_LIB.read(new Uint8Array(e.target.result),{type:'array'});
      D=parseXlsx(wb);renderTab(curTab);updHdr();
      if(el){el.textContent='✓ Actualizado correctamente';el.className='msg ok';}
    }catch(err){if(el){el.textContent='Error: '+err.message;el.className='msg err';}}
    input.value='';
  };
  r.readAsArrayBuffer(file);
}

const CHRONO_ORDER=[2,5,10,19,9,13,14,20,25,31,37,43,44,49,54,55,60,67,72,1,6,8,11,15,16,21,22,26,27,28,29,32,33,34,38,40,41,45,47,50,53,56,59,61,66,68,69,3,4,7,12,17,18,23,24,30,35,36,39,42,46,48,51,52,57,58,62,63,64,65,70,71];
const GD_STATIC={"A":["México","Corea del Sur","Sudáfrica","República Checa"],"B":["Canadá","Suiza","Catar","Bosnia-Herzegovina"],"C":["Brasil","Marruecos","Escocia","Haití"],"D":["USA","Paraguay","Australia","Turquía"],"E":["Alemania","Curaçao","Costa de Marfil","Ecuador"],"F":["Países Bajos","Japón","Suecia","Túnez"],"G":["Bélgica","Egipto","Irán","Nueva Zelanda"],"H":["España","Cabo Verde","Arabia Saudí","Uruguay"],"I":["Francia","Senegal","Irak","Noruega"],"J":["Argentina","Argelia","Austria","Jordania"],"K":["Portugal","R.D. Congo","Uzbekistán","Colombia"],"L":["Inglaterra","Croacia","Ghana","Panamá"]};

function safe_int_js(v){if(v==null)return null;const n=Number(v);return isNaN(n)?null:Math.round(n);}

function parseXlsx(wb){
  const PN=["Tamayo","Vispo","Juanpa","Macaco","Aranguren","Arocena","Alonso","Quemada"];
  const official={};
  const wsR=wb.Sheets["🏟️ Resultados Oficiales"];
  if(wsR){
    const rows=XLSX.utils.sheet_to_json(wsR,{header:1,raw:true,defval:null});
    rows.forEach(row=>{
      if(typeof row[0]==='number'&&row[0]>=1&&row[0]<=72){
        const g1=safe_int_js(row[2]),g2=safe_int_js(row[4]);
        official[String(row[0])]=[row[1],g1,g2,row[5]];
      }
    });
  }
  // Official team pts
  const otp={};
  Object.entries(GD_STATIC).forEach(([g,teams])=>{
    teams.forEach(team=>{
      let pts=0;
      Object.values(official).forEach(([t1,g1,g2,t2])=>{
        if(g1==null)return;
        if(t1===team)pts+=g1>g2?3:g1===g2?1:0;
        else if(t2===team)pts+=g2>g1?3:g1===g2?1:0;
      });
      otp[team]=pts;
    });
  });
  // Official rankings
  const oRank={};
  GROUPS.forEach(g=>{
    const teams=GD_STATIC[g],gi=GROUPS.indexOf(g);
    const st=Object.fromEntries(teams.map(t=>[t,{pts:0,gf:0,gc:0}]));
    GM.forEach(([i,j],mi)=>{
      const mid=String(gi*6+mi+1),o=official[mid];
      if(!o||o[1]==null)return;
      const t1=teams[i],t2=teams[j],g1=o[1],g2=o[2];
      st[t1].gf+=g1;st[t1].gc+=g2;st[t2].gf+=g2;st[t2].gc+=g1;
      if(g1>g2)st[t1].pts+=3;else if(g1<g2)st[t2].pts+=3;else{st[t1].pts++;st[t2].pts++;}
    });
    oRank[g]=[...teams].sort((a,b)=>{
      if(st[b].pts!==st[a].pts)return st[b].pts-st[a].pts;
      const da=st[a].gf-st[a].gc,db=st[b].gf-st[b].gc;
      if(db!==da)return db-da;return st[b].gf-st[a].gf;
    });
  });

  const scoredChrono=CHRONO_ORDER.filter(m=>official[String(m)]?.[1]!=null);
  const matchLabels={};
  CHRONO_ORDER.forEach(m=>{
    const o=official[String(m)];
    if(o){const g1=o[1];matchLabels[String(m)]=g1!=null?`P${m}: ${o[0]} ${g1}-${o[2]} ${o[3]}`:`P${m}: ${o[0]} vs ${o[3]}`;}
  });

  function mptsFn(pg1,pg2,og1,og2){
    if(pg1==null||pg2==null||og1==null||og2==null)return 0;
    let p=0;if(pg1===og1&&pg2===og2)p=6;
    else if((pg1>pg2)===(og1>og2)&&(pg1===pg2)===(og1===og2))p=3;
    if(pg1===og1&&p<6)p++;if(pg2===og2&&p<6)p++;return p;
  }

  const players={};
  PN.forEach(p=>{
    const ws=wb.Sheets[p];if(!ws)return;
    const preds={};
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
    rows.forEach(row=>{
      if(typeof row[0]==='number'&&row[0]>=1&&row[0]<=72){
        preds[String(row[0])]=[safe_int_js(row[2]),safe_int_js(row[4])];
      }
    });
    // Total from E459
    const tc=ws['E459'];const total=tc?Math.round(Number(tc.v)||0):0;

    // Match history in chrono order
    const match_history=[];let cum=0;
    scoredChrono.forEach(mid=>{
      const o=official[String(mid)],pr=preds[String(mid)]||[null,null];
      const pts=mptsFn(pr[0],pr[1],o?.[1],o?.[2]);
      cum+=pts;
      match_history.push({mid,pts,cum,lbl:matchLabels[String(mid)]||`P${mid}`});
    });

    // Groups breakdown
    const groups_breakdown={};
    GROUPS.forEach(g=>{
      const gi=GROUPS.indexOf(g),teams=GD_STATIC[g];
      const pst=Object.fromEntries(teams.map(t=>[t,{pts:0,gf:0,gc:0}]));
      GM.forEach(([i,j],mi)=>{
        const mid=String(gi*6+mi+1),pr=preds[mid]||[null,null];
        const t1=teams[i],t2=teams[j],g1=pr[0],g2=pr[1];
        if(g1==null)return;
        pst[t1].gf+=g1;pst[t1].gc+=g2;pst[t2].gf+=g2;pst[t2].gc+=g1;
        if(g1>g2)pst[t1].pts+=3;else if(g1<g2)pst[t2].pts+=3;else{pst[t1].pts++;pst[t2].pts++;}
      });
      const pRank=[...teams].sort((a,b)=>{
        if(pst[b].pts!==pst[a].pts)return pst[b].pts-pst[a].pts;
        const da=pst[a].gf-pst[a].gc,db=pst[b].gf-pst[b].gc;
        if(db!==da)return db-da;return pst[b].gf-pst[a].gf;
      });
      const oR=oRank[g]||[];
      let pos_pts=0;
      const positions=pRank.map((t,i)=>{
        const ot=oR[i];const correct=(ot&&ot===t);
        if(correct)pos_pts+=3;
        return{pos:i+1,predicted:t,official:ot,correct};
      });
      const bonus=pos_pts===12?3:0;
      let team_pts=0;
      const tms=teams.map(team=>{
        const ptp=pst[team]?.pts||0,otp_val=otp[team]||0;
        const correct=(ptp===otp_val);if(correct)team_pts+=2;
        return{team,predicted_pts:ptp,official_pts:otp_val,correct,earned:correct?2:0};
      });
      groups_breakdown[g]={pos_pts,bonus,team_pts,total_group_extra:pos_pts+bonus+team_pts,positions,teams:tms};
    });

    players[p]={total,predictions:preds,match_history,groups_breakdown};
  });

  return{groups:GD_STATIC,group_order:GROUPS,official,official_team_pts:otp,
    official_rankings:oRank,scored_chrono:scoredChrono,match_labels:matchLabels,players};
}

const TAB_IDS=['ranking','results','preds','groups','evo','prizes','admin'];

function showTab(t){
  curTab=t;
  document.querySelectorAll('nav button').forEach((b,i)=>{
    b.classList.toggle('active',TAB_IDS[i]===t);
  });
  TAB_IDS.forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'block':'none';
  });
  renderTab(t);
}

function renderTab(t){
  if(t==='ranking')renderRanking();
  else if(t==='results')renderResults();
  else if(t==='preds')renderPreds();
  else if(t==='groups')renderGroups();
  else if(t==='evo')renderEvo();
  else if(t==='prizes')renderPrizes();
  else if(t==='admin')renderAdmin();
}

function updHdr(){
  const s=D.scored_chrono?.length||0;
  document.getElementById('sub').textContent=`${s} de 72 partidos jugados`;
  document.getElementById('pbfill').style.width=`${Math.round(s/72*100)}%`;
}
